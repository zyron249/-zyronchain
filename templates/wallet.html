<!DOCTYPE html>
<html>
<head>
    <title>Zyron Web Wallet</title>
</head>
<body style="background:#0f172a;color:white;font-family:Arial;padding:20px;">

<h1>🚀 Zyron Web Wallet</h1>

<button onclick="createWallet()">Create Wallet</button>
<button onclick="getBalance()">Check Balance</button>
<button onclick="claimFaucet()">Claim Faucet</button>

<h2>Wallet</h2>
<pre id="walletBox"></pre>

<h2>Send ZYN</h2>
<input id="receiver" placeholder="Receiver Address" style="width:400px;">
<input id="amount" placeholder="Amount" type="number">
<button onclick="sendZyn()">Send</button>

<h2>Result</h2>
<pre id="resultBox"></pre>

<script>
let wallet = null;

async function createWallet() {
    const res = await fetch('/wallet/new');
    wallet = await res.json();
    document.getElementById('walletBox').textContent = JSON.stringify(wallet, null, 2);
}

async function getBalance() {
    if (!wallet) return alert('Create wallet first');
    const res = await fetch('/address/' + wallet.address);
    const data = await res.json();
    document.getElementById('resultBox').textContent = JSON.stringify(data, null, 2);
}

async function claimFaucet() {
    if (!wallet) return alert('Create wallet first');
    const res = await fetch('/faucet/' + wallet.address);
    const data = await res.json();
    document.getElementById('resultBox').textContent = JSON.stringify(data, null, 2);
}

async function sendZyn() {
    if (!wallet) return alert('Create wallet first');

    const receiver = document.getElementById('receiver').value;
    const amount = document.getElementById('amount').value;

    const res = await fetch('/wallet/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            sender: wallet.address,
            receiver: receiver,
            amount: amount,
            private_key: wallet.private_key,
            public_key: wallet.public_key
        })
    });

    const data = await res.json();
    document.getElementById('resultBox').textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
